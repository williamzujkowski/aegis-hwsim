name: Publish to crates.io (trusted publishing)

# Trusted Publishing to crates.io — NO long-lived CARGO_REGISTRY_TOKEN.
# The aegis-hwsim crate is configured on crates.io with a trusted
# publisher pointing at this workflow + the `release` environment.
# rust-lang/crates-io-auth-action exchanges the GitHub OIDC token
# for a short-lived (~30 min) crates.io token consumed by
# `cargo publish` via scripts/publish-if-new.sh.
#
# Mirrors the `aegis-boot/aegis-boot` publish workflow; same
# scripts/publish-if-new.sh wrapper makes the publish idempotent
# (skip + exit 0 if already at the workspace version, no
# cascade-fail).
#
# Triggers:
#   - Tagged releases (v*.*.* / v*.*.*-*)
#   - workflow_dispatch for manual republish

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:

# Single-publish-at-a-time so we never race two tag pushes.
concurrency:
  group: crates-publish
  cancel-in-progress: false

jobs:
  publish:
    name: cargo publish (trusted)
    runs-on: ubuntu-latest
    # Environment gate: tag-scoped to `v*` (only signed v* tag
    # pushes can enter — branches cannot publish). No required-
    # reviewer rule — autonomous bug-fix releases per the
    # aegis-boot/aegis-boot precedent (2026-04-22).
    environment: release
    # Cap the whole job at 15 min. Cold OIDC + toolchain install + a
    # crates.io publish typically takes <3 min; a 5x headroom catches
    # crates.io stalls without sitting in the queue.
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned)
        run: |
          rustup toolchain install 1.85.0 --profile minimal --no-self-update
          rustup default 1.85.0
          rustc --version

      - name: Audit — refuse publish if test keyring material would ship
        # CLAUDE.md security constraint #4: PK/KEK/db with
        # TEST_ONLY_NOT_FOR_PRODUCTION CN must never ship to crates.io.
        # The audit script checks two things:
        #   1. Cargo.toml exclude list still keeps firmware/test-keyring/**
        #      out of the package (drift detection).
        #   2. No suspicious-extension file (.fd .pem .key .crt .der .cer
        #      .efi .esl .auth, anything under firmware/) carries the
        #      placeholder token.
        # Source/doc/test-fixture references to the token are allowed
        # (the token IS the policy enforcement constant).
        # Runs BEFORE OIDC mint so a positive failure doesn't burn a
        # crates.io short-lived token.
        timeout-minutes: 2
        run: ./scripts/audit-no-test-keys.sh

      - name: Mint short-lived crates.io token (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: cio_auth

      - name: publish aegis-hwsim
        # The publish step is the one that talks to crates.io. If the
        # registry stalls, the whole step blocks. 10-min step cap is
        # the explicit "give up" boundary — well above the ~30s a
        # healthy publish takes.
        timeout-minutes: 10
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cio_auth.outputs.token }}
        run: ./scripts/publish-if-new.sh aegis-hwsim

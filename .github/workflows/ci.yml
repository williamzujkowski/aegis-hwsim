name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: cargo build + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          components: clippy, rustfmt
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy (workspace, deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --locked

  validate-personas:
    name: persona YAML lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: sudo apt-get install -y yamllint
      - name: yamllint personas/
        run: yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable}}" personas/

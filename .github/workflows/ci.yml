name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component clippy,rustfmt
          rustup default 1.85.0
      - name: Install QEMU + OVMF for smoke scenario
        # qemu-boots-ovmf integration test exercises the full
        # Persona → Invocation → SerialCapture pipeline end-to-end.
        # Without these the test self-Skips, which is fine — but
        # installing them turns Skip into Pass and proves the harness
        # is wired correctly. Tiny install cost; outsized signal.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y qemu-system-x86 ovmf
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked
      - name: Check JSONSchema is in sync with source
        run: cargo run --locked -q --bin aegis-hwsim -- gen-schema --check schemas/persona.schema.json
      - name: Validate research registry against SCHEMA.json
        # docs/research/registry/{sources,papers,projects}.yaml each
        # carry structured metadata about adjacent tools / papers /
        # projects. SCHEMA.json (JSON Schema 2020-12) is the contract.
        # check-jsonschema is a single Python install with no Rust
        # dep — cheaper than wiring schemars into the binary.
        run: |
          pipx install check-jsonschema
          for f in docs/research/registry/sources.yaml \
                   docs/research/registry/papers.yaml \
                   docs/research/registry/projects.yaml; do
            check-jsonschema --schemafile docs/research/registry/SCHEMA.json "$f"
          done
      - name: Generate coverage-grid artifact
        # Live grid (not --dry-run) — actually runs each cell. The
        # smoke scenario will Pass against qemu-smoke-no-tpm; everything
        # else Skips with a specific reason. Reviewers click the
        # artifact to see the matrix shape for this PR.
        run: |
          mkdir -p artifacts
          cargo run --locked -q --bin aegis-hwsim -- coverage-grid > artifacts/coverage-grid.md
          cargo run --locked -q --bin aegis-hwsim -- coverage-grid --format json > artifacts/coverage-grid.json
      - name: Upload coverage-grid artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-grid
          path: artifacts/coverage-grid.*
          retention-days: 30
          if-no-files-found: error

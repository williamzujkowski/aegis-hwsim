name: CI
on: [push, pull_request]
permissions:
  contents: read

# Cancel superseded runs on the same ref. CLAUDE.md "Security
# constraints #3" calls for CI concurrency limits; this prevents
# overlapping runs from doubling up on swtpm/QEMU resource use when
# branches are pushed in rapid succession. The `cancel-in-progress`
# flag is safe here — tests are deterministic and a fresh run from
# the latest commit is always preferred over an in-flight stale run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Belt + braces: any individual scenario already enforces its own
    # in-process timeout (5 min default per CLAUDE.md), but a runaway
    # cargo command (e.g. dependency resolution stalled on a bad
    # mirror) would still hold the runner for GitHub's 360-min default.
    # 30 min is well above the typical ~5 min run with headroom for
    # cold caches.
    timeout-minutes: 30
    # If we ever fan this out into a matrix (E5 OS coverage, E6 TPM
    # variants), the CLAUDE.md non-negotiable max-parallel: 4 lives
    # here — `strategy: { matrix: ..., max-parallel: 4 }`.
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component clippy,rustfmt
          rustup default 1.85.0
      - name: Install QEMU + OVMF for smoke scenario
        # qemu-boots-ovmf integration test exercises the full
        # Persona → Invocation → SerialCapture pipeline end-to-end.
        # Without these the test self-Skips, which is fine — but
        # installing them turns Skip into Pass and proves the harness
        # is wired correctly. Tiny install cost; outsized signal.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y qemu-system-x86 ovmf
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked
      - name: Check JSONSchema is in sync with source
        run: cargo run --locked -q --bin aegis-hwsim -- gen-schema --check schemas/persona.schema.json
      - name: Validate research registry against SCHEMA.json
        # docs/research/registry/{sources,papers,projects}.yaml each
        # carry structured metadata about adjacent tools / papers /
        # projects. SCHEMA.json (JSON Schema 2020-12) is the contract.
        # check-jsonschema is a single Python install with no Rust
        # dep — cheaper than wiring schemars into the binary.
        run: |
          pipx install check-jsonschema
          for f in docs/research/registry/sources.yaml \
                   docs/research/registry/papers.yaml \
                   docs/research/registry/projects.yaml; do
            check-jsonschema --schemafile docs/research/registry/SCHEMA.json "$f"
          done
      - name: Generate coverage-grid artifact
        # Live grid (not --dry-run) — actually runs each cell. The
        # smoke scenario will Pass against qemu-smoke-no-tpm; everything
        # else Skips with a specific reason. Reviewers click the
        # artifact to see the matrix shape for this PR.
        run: |
          mkdir -p artifacts
          cargo run --locked -q --bin aegis-hwsim -- coverage-grid > artifacts/coverage-grid.md
          cargo run --locked -q --bin aegis-hwsim -- coverage-grid --format json > artifacts/coverage-grid.json
      - name: Upload coverage-grid artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-grid
          path: artifacts/coverage-grid.*
          retention-days: 30
          if-no-files-found: error

      - name: Pre-publish audit + cargo publish dry-run
        # Release-readiness gate. `cargo publish --dry-run` packages
        # the crate exactly as it would ship to crates.io and runs a
        # full compile of the resulting tarball — catches metadata
        # drift, missing files, dep-resolution bugs, etc., months
        # before the actual v1.0 tag instead of at tag-push time.
        # `audit-no-test-keys.sh` runs first (cheaper) so a
        # TEST_ONLY_NOT_FOR_PRODUCTION leak fails fast without
        # spending compile time.
        run: |
          ./scripts/audit-no-test-keys.sh
          cargo publish --dry-run --locked --allow-dirty

      - name: Cleanup stray test processes + work dirs
        # CLAUDE.md "Security constraints #3" mandates swtpm cleanup
        # in trap handlers. Drop impls in src/swtpm.rs and src/serial.rs
        # SIGKILL their children when the harness exits cleanly, but
        # if a scenario panics the runner can leak. Belt-and-suspenders
        # cleanup keeps the runner clean for any subsequent step and
        # avoids leaving sockets in /tmp on shared GitHub runners.
        if: always()
        run: |
          pkill -x swtpm 2>/dev/null || true
          pkill -x qemu-system-x86_64 2>/dev/null || true
          rm -rf /tmp/aegis-hwsim-* 2>/dev/null || true
